# Prometheus 설정 파일
# FastAPI 앱의 /metrics 엔드포인트에서 메트릭 수집

global:
  scrape_interval: 5s      # 5초마다 수집
  evaluation_interval: 5s

scrape_configs:
  - job_name: "fastapi-app"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: "image-processor"
    static_configs:
      - targets: ["image-processor:8081"]
    metrics_path: /metrics
