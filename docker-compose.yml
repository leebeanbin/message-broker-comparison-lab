# ============================================
# Docker Compose: 전체 인프라 + 모니터링 스택
# 사용법: docker compose up -d
# 버전: Redis 8 · RabbitMQ 4 · Kafka 4.0 (KRaft)
# ============================================

services:

  # ── Redis 8 ────────────────────────────────
  # Redis 8: 통합 모듈 (JSON, Search, TimeSeries, Bloom 내장)
  # + Vector Set, HGETDEL/HSETEX 등 신규 명령어
  redis:
    image: redis:8-alpine
    container_name: lab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── RabbitMQ 4 (Management UI 포함) ───────
  # RabbitMQ 4: Quorum Queue 기본, Classic Mirror 제거
  # AMQP 기본 동작은 3.x와 호환
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: lab-rabbitmq
    ports:
      - "5672:5672"     # AMQP 프로토콜
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Kafka 4.0 (KRaft 전용 - ZooKeeper 완전 제거) ─
  # Kafka 4.0: ZooKeeper 코드 완전 삭제, KRaft만 지원
  kafka:
    image: apache/kafka:4.0.0
    container_name: lab-kafka
    ports:
      - "9092:9092"     # 외부 접근
      - "9094:9094"     # 내부 통신
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M

  # ── Kafka UI (웹 관리 도구) ────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: lab-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy

  # ── Prometheus (메트릭 수집) ───────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - app
      - image-processor
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Grafana (시각화 대시보드) ──────────────
  grafana:
    image: grafana/grafana:11.5.2
    container_name: lab-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Go 이미지 처리 서비스 ──────────────────
  image-processor:
    build: ./image-processor
    container_name: lab-image-processor
    ports:
      - "8081:8081"
    environment:
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── FastAPI 앱 ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab-app
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
